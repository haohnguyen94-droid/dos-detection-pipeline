name: CI

on:
  push:
    branches:
      - main

jobs:
  build-test-and-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker Compose is available
        run: docker compose version

      - name: Build Docker services
        run: docker compose build

      - name: Run regression tests
        run: |
          make test | tee test-output.txt
          TEST_SUMMARY_LINE="$(grep -E '^Summary: [0-9]+/[0-9]+ passed$' test-output.txt | tail -n1 || true)"
          if [ -z "$TEST_SUMMARY_LINE" ]; then
            TEST_SUMMARY_LINE="Summary: unavailable (no parsable summary line found)"
          fi
          {
            echo "## Test Results"
            echo ""
            echo "- ${TEST_SUMMARY_LINE}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate coverage summary
        run: |
          docker run --rm \
            -v "$PWD":/work \
            -w /work/detector \
            dos-detection-pipeline-detector \
            sh -lc '
              set -eu
              python -m pip install --no-cache-dir coverage >/dev/null
              coverage run /work/tests/run_regression.py /work/tests/pcaps >/tmp/coverage-test-output.txt
              coverage report -m | tee /work/coverage-report.txt
            '

          COVERAGE_TOTAL_LINE="$(grep -E '^TOTAL' coverage-report.txt | tail -n1 || true)"
          if [ -z "$COVERAGE_TOTAL_LINE" ]; then
            COVERAGE_TOTAL_LINE="TOTAL coverage unavailable"
          fi

          {
            echo "## Coverage Summary"
            echo ""
            echo '```'
            cat coverage-report.txt
            echo '```'
            echo ""
            echo "- ${COVERAGE_TOTAL_LINE}"
          } >> "$GITHUB_STEP_SUMMARY"
